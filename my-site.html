<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Welcome to My Site</title>
<style>
  :root{
    --title-color:#ffffff;
    --subtitle-color:#e9e9e9;
    --button-text:#ffffff;
    --accent:#6c5ce7;
    --icon-color:#ffffff;
    --icon-bg:rgba(255,255,255,0.14);
    --overlay-opacity:0.45;
    --default-bg:linear-gradient(135deg, #1e1e2f 0%, #2d2d44 100%);
    --anim-speed:0.8s;
    --font:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --title-size:clamp(2.2rem,6vw,5rem);
    --subtitle-size:clamp(1rem,2.5vw,1.5rem);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{font-family:var(--font);overflow:hidden;background:var(--default-bg);color:var(--title-color);}
  #bg-video,#bg-image{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:-2;}
  #bg-image{background-size:cover;background-position:center;}
  #overlay{position:fixed;inset:0;background:#000;opacity:var(--overlay-opacity);z-index:-1;pointer-events:none;}
  #content{position:relative;height:100%;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
  #hero{display:flex;flex-direction:column;align-items:center;gap:1rem;text-align:center;}
  #content h1{font-size:var(--title-size);color:var(--title-color);text-shadow:0 2px 20px rgba(0,0,0,.5);line-height:1.1;}
  #content p.subtitle{font-size:var(--subtitle-size);color:var(--subtitle-color);max-width:40ch;text-shadow:0 1px 10px rgba(0,0,0,.6);}
  .btn{display:inline-flex;align-items:center;gap:.5rem;border:none;cursor:pointer;font-size:1rem;font-weight:600;color:var(--button-text);background:var(--accent);padding:.8rem 1.4rem;border-radius:999px;text-decoration:none;transition:transform .1s;}
  .btn:active{transform:scale(.96);}
  #replay{position:fixed;bottom:1rem;left:1rem;z-index:20;}
  #socials{display:flex;gap:1rem;margin-top:.6rem;flex-wrap:wrap;justify-content:center;}
  .social{width:44px;height:44px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--icon-bg);color:var(--icon-color);transition:background .2s,transform .1s;}
  .social:hover{background:var(--accent);transform:translateY(-2px);}
  .social svg{width:22px;height:22px;}
  #intro{position:fixed;inset:0;z-index:100;background:#000;display:none;align-items:center;justify-content:center;transition:opacity .6s ease;cursor:pointer;}
  #intro video{width:100%;height:100%;object-fit:cover;}
  @keyframes su-fade{from{opacity:0}to{opacity:1}}
  @keyframes su-slide-up{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
  @keyframes su-slide-down{from{opacity:0;transform:translateY(-40px)}to{opacity:1;transform:translateY(0)}}
  @keyframes su-zoom{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
  @keyframes su-blur{from{opacity:0;filter:blur(18px)}to{opacity:1;filter:blur(0)}}
  @keyframes su-drop{0%{opacity:0;transform:translateY(-120%)}60%{opacity:1;transform:translateY(8%)}100%{transform:translateY(0)}}
  .su-fade{animation:su-fade var(--anim-speed) ease both}
  .su-slide-up{animation:su-slide-up var(--anim-speed) ease both}
  .su-slide-down{animation:su-slide-down var(--anim-speed) ease both}
  .su-zoom{animation:su-zoom var(--anim-speed) ease both}
  .su-blur{animation:su-blur var(--anim-speed) ease both}
  .su-drop{animation:su-drop var(--anim-speed) cubic-bezier(.34,1.56,.64,1) both}
  @keyframes loop-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  @keyframes loop-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  @keyframes loop-sway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
  @keyframes loop-glow{0%,100%{text-shadow:0 0 8px rgba(255,255,255,.2)}50%{text-shadow:0 0 26px rgba(255,255,255,.75)}}
  .loop-float{animation:loop-float 4s ease-in-out infinite}
  .loop-pulse{animation:loop-pulse 3s ease-in-out infinite}
  .loop-sway{animation:loop-sway 5s ease-in-out infinite}
  .loop-glow{animation:loop-glow 3s ease-in-out infinite}
</style>
</head>
<body>
  
  <div id="overlay"></div>
  <div id="content">
    <div id="hero" class="loop-glow">
      <h1>Welcome to My Site</h1>

      </div>
    </div>
  </div>
</body>
</html>
